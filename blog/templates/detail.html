<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - 博客</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Quill 样式用于展示富文本片段 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1><a href="/">我的博客</a></h1>
        <nav><a href="/">首页</a> | <a href="/admin">管理后台</a></nav>
    </header>
    <main class="ql-snow">
        <article class="post-detail">
            <h1>{{ post.title }}</h1>
            <div class="meta">分类: {{ post.category }} | 发布时间: {{ post.created_at }}</div>
            <hr>
            <div class="ql-editor content">
                {{ post.content | safe }}
            </div>
        </article>
    </main>
</body>
</html>
