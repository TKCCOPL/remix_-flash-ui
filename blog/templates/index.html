<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>博客系统</h1>
        <nav><a href="/">首页</a> | <a href="/admin">管理后台</a></nav>
    </header>
    <main>
        <div class="posts">
            {% for post in posts %}
            <article class="post-card">
                <h2><a href="/post/{{ post.id }}">{{ post.title }}</a></h2>
                <div class="meta">分类: {{ post.category }} | 日期: {{ post.created_at }}</div>
                <div class="snippet">{{ post.content | striptags | truncate(150) }}</div>
                <a href="/post/{{ post.id }}" class="read-more">阅读全文 &rarr;</a>
            </article>
            {% else %}
            <p>还没有发布任何文章，赶紧去后台写一篇吧！</p>
            {% endfor %}
        </div>
    </main>
</body>
</html>
